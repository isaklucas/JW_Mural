name: release

# Dispara quando o PR develop -> main é mergeado (push na main).
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # precisa do histórico + tags para calcular a versão

      # Permite pular o release num push específico (ex.: bootstrap) com [skip release].
      - name: Checar [skip release]
        id: skip
        shell: pwsh
        run: |
          $msg = git log -1 --pretty=%B
          if ($msg -match '\[skip release\]') {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Commit pede [skip release]; abortando."
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      # Próxima versão = maior tag vX.Y[.Z] + 1 no patch. Ex.: v1.3 -> 1.3.1.
      - name: Calcular próxima versão
        id: ver
        if: steps.skip.outputs.skip == 'false'
        shell: pwsh
        run: |
          $tags = git tag --list "v*" | ForEach-Object { $_.TrimStart('v') }
          $versions = @()
          foreach ($t in $tags) {
            if ($t -match '^\d+(\.\d+)*$') {
              $p = @($t.Split('.') | ForEach-Object { [int]$_ })
              while ($p.Count -lt 3) { $p += 0 }
              $versions += [version]::new($p[0], $p[1], $p[2])
            }
          }
          if ($versions.Count -gt 0) {
            $latest = ($versions | Sort-Object | Select-Object -Last 1)
          } else {
            $latest = [version]"1.3.0"   # seed inicial
          }
          $next = "$($latest.Major).$($latest.Minor).$($latest.Build + 1)"
          $tag = "v$next"
          if (git tag --list $tag) {
            throw "Tag $tag já existe — abortando para não sobrescrever release."
          }
          Write-Host "Última: $latest  ->  Próxima: $next ($tag)"
          echo "next=$next" >> $env:GITHUB_OUTPUT
          echo "tag=$tag"  >> $env:GITHUB_OUTPUT

      - name: Setup Python
        if: steps.skip.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências de build
        if: steps.skip.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Preparar artefatos exigidos pelo .spec
        if: steps.skip.outputs.skip == 'false'
        shell: pwsh
        run: |
          # 1) VERSION.txt = versão calculada (vai embutido no instalador e no app).
          Set-Content -Path VERSION.txt -Value "${{ steps.ver.outputs.next }}" -NoNewline -Encoding utf8

          # 2) Ícone .ico a partir do PNG (mesmo passo do build.bat).
          if (-not (Test-Path "assets/jw_mural_icon.ico")) {
            python -c "from PIL import Image; img=Image.open('assets/jw_mural_icon_40x40.png').convert('RGBA'); img.save('assets/jw_mural_icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(256,256)])"
          }

          # 3) .env placeholder (o .spec empacota ('.env','.')). Defaults locais.
          if (-not (Test-Path ".env")) {
            @(
              "DB_TYPE=mongodb"
              "MONGODB_URI=mongodb://localhost:27017/"
              "MONGODB_DB_NAME=jw_mural"
              "MONGODB_COLLECTION=publicadores"
            ) | Set-Content -Path .env -Encoding utf8
          }

          # 4) Pasta documentosCriados (empacotada pelo .spec).
          New-Item -ItemType Directory -Force -Path documentosCriados | Out-Null

      - name: Build PyInstaller
        if: steps.skip.outputs.skip == 'false'
        run: python -m PyInstaller JW_Mural.spec

      - name: Instalar Inno Setup
        if: steps.skip.outputs.skip == 'false'
        run: choco install innosetup -y --no-progress

      - name: Compilar instalador
        if: steps.skip.outputs.skip == 'false'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe não encontrado em $iscc" }
          New-Item -ItemType Directory -Force -Path installer_output | Out-Null
          & $iscc JW_Mural.iss
          if (-not (Test-Path "installer_output/Setup_JW_Mural.exe")) {
            throw "Instalador não gerado."
          }

      - name: Criar tag + GitHub Release
        if: steps.skip.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" `
            "installer_output/Setup_JW_Mural.exe" `
            --target "${{ github.sha }}" `
            --title "${{ steps.ver.outputs.tag }}" `
            --generate-notes

      # Opcional: se houver um PAT em secrets.RELEASE_PAT, commita o VERSION.txt
      # bumpado de volta na main (para o repo refletir a versão). Sem o PAT, é
      # pulado — a tag continua sendo a fonte da verdade da versão.
      - name: Commit VERSION.txt de volta na main (opcional)
        if: steps.skip.outputs.skip == 'false' && env.RELEASE_PAT != ''
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          Set-Content -Path VERSION.txt -Value "${{ steps.ver.outputs.next }}" -NoNewline -Encoding utf8
          git add VERSION.txt
          git commit -m "chore: bump VERSION.txt para ${{ steps.ver.outputs.next }} [skip release]"
          git remote set-url origin "https://x-access-token:$env:RELEASE_PAT@github.com/${{ github.repository }}.git"
          git push origin main
